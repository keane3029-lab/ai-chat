<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h2 id="currentChatTitle">New Conversation</h2>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="system-message">Select or start a new chat to begin.</div>
            </div>

            <div class="input-container">
                <div class="input-wrapper" style="display: flex; align-items: center; gap: 8px; width: 100%;">
                    
                    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="updateUploadLabel()">
                    <button class="action-btn" onclick="document.getElementById('fileInput').click()" style="background: none; border: none; cursor: pointer; font-size: 1.2rem;">📎</button>
                    
                    <input type="text" id="userInput" placeholder="Message OpenRouter AI or attach a photo..." onkeydown="if(event.key === 'Enter') sendMessage()" style="flex-grow: 1;">
                    <button id="sendBtn" onclick="sendMessage()">➔</button>
                </div>
                
                <div id="fileLabel" style="color: #aaa; font-size: 0.8rem; margin-top: 5px; padding-left: 10px; text-align: left; width: 100%;"></div>
            </div>
        </main>
    </div>
    
    <script src="app.js?v=1.4"></script>
</body>
</html>
